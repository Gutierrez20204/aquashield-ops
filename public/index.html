<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aqua Shield — Centro de Operaciones</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;400;700;900&family=Syncopate:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/login.css" />
</head>
<body>
  <!-- Atmospheric Layers -->
  <div class="master-bg">
    <div class="grain"></div>
    <div class="light-bloom bloom-1"></div>
    <div class="light-bloom bloom-2"></div>
    <div class="grid-overlay"></div>
    <!-- Ambient Background Mirror (Blurred) -->
    <video autoplay muted playsinline class="bg-video-blur">
      <source src="video_login_1.mp4" type="video/mp4">
    </video>
    
    <!-- Main Sharp Video -->
    <video autoplay muted playsinline class="main-visual">
      <source src="video_login_1.mp4" type="video/mp4">
    </video>
    
    <div class="vignette-overlay"></div>
  </div>

  <main class="ops-layout">
    <!-- Brand Visual Section -->
    <section class="visual-pane">
      <div class="brand-center">
        <div class="hero-brand">
          <div class="logo-shimmer">
            <img src="logo-transparent.png" alt="Aqua Shield" class="main-logo-hero" />
          </div>
          <div class="brand-titles">
            <h1 class="glitch-text" data-text="AQUA SHIELD">AQUA SHIELD</h1>
            <h2 class="sub-text">PROTECCIÓN VEHICULAR PREMIUM</h2>
          </div>
        </div>
        
        <div class="system-status">
          <div class="status-item">
            <span class="label">UBICACIÓN</span>
            <span class="val">MEDELLÍN — BARRANQUILLA</span>
          </div>
          <div class="status-item">
            <span class="label">ESTADO</span>
            <span class="val online">OPERACIONAL</span>
          </div>
        </div>
      </div>
    </section>

    <!-- Interactive Login Section -->
    <section class="login-pane">
      <div class="glass-terminal">
        <div class="terminal-header">
          <div class="security-seal">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
          </div>
          <div class="terminal-title">
            <h3>ACCESO SEGURO</h3>
            <p>INGRESE CREDENCIALES DE OPERADOR</p>
          </div>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)" class="terminal-form">
          <div class="input-container">
            <input type="text" id="username" required placeholder=" " autocomplete="username" />
            <label>ID DE OPERADOR</label>
            <div class="accent-bar"></div>
          </div>

          <div class="input-container">
            <input type="password" id="password" required placeholder=" " autocomplete="current-password" />
            <label>CLAVE DE ACCESO</label>
            <div class="accent-bar"></div>
          </div>

          <div class="form-extras">
            <label class="toggle-switch">
              <input type="checkbox" checked />
              <span class="slider"></span>
              Mantener activo
            </label>
            <a href="#" class="forgot-btn">¿Problemas de acceso?</a>
          </div>

          <div id="loginAlert" class="error-log"></div>

          <button type="submit" id="btnLogin" class="cmd-btn">
            <span class="btn-shine"></span>
            <span class="btn-text">INICIALIZAR SISTEMA</span>
            <div class="btn-spinner" id="btnLoader"></div>
          </button>
        </form>

        <footer class="terminal-footer">
          <div class="footer-line"></div>
          <div class="footer-info">
            <span style="color:var(--secondary); font-weight:800;">AQ-OPS v2.3.0 PRODUCTION READY</span>
            <span class="encryption">ENCRIPTACIÓN AES-256 BIT ACTIVA</span>
          </div>
        </footer>
      </div>
    </section>
  </main>

  <script src="js/login.js"></script>
</body>
</html>
